root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/server.exe ./cmd/server"
bin = "tmp\\server.exe"
full_bin = "tmp\\server.exe"
include_ext = ["go"]
exclude_dir = ["tmp", "vendor", "frontend", "node_modules"]
delay = 1000

[log]
time = true

[color]
main = "yellow"
watcher = "cyan"
build = "green"
runner = "magenta"
